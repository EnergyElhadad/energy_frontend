name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    # Pin to the staging runner specifically. Plain `self-hosted` was
    # ambiguous — any registered self-hosted runner could pick up the job,
    # including the production one (which doesn't have /opt/energy-staging/).
    # The staging runner must be tagged with the `energy-staging` label in
    # GitHub repo settings → Actions → Runners.
    runs-on: energy-staging

    steps:
      - name: Pull Frontend
        run: |
          cd /opt/energy-staging/energy_frontend
          git pull

      - name: Pull Backend
        run: |
          cd /opt/energy-staging/energy_backend
          git checkout staging
          git pull origin staging 

      - name: Redeploy Docker Compose
        run: |
          cd /opt/energy-staging/energy_backend
          docker compose -f docker-compose.prod.yml down  && docker compose -f docker-compose.prod.yml up -d --build