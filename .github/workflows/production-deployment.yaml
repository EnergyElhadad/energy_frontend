name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: energy-production

    steps:
      - name: Pull Frontend
        run: |
          cd /opt/energy-production/energy_frontend
          git checkout main
          git pull origin main

      - name: Pull Backend
        run: |
          cd /opt/energy-production/energy_backend
          git checkout main
          git pull origin main 

      - name: Redeploy Docker Compose
        run: |
          cd /opt/energy-production/energy_backend
          docker compose -f docker-compose.prod.yml down  && docker compose -f docker-compose.prod.yml up -d --build