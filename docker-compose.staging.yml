# Compose override for staging deploys. The backend repo's
# docker-compose.prod.yml hardcodes the production NEXT_PUBLIC_API_URL build
# arg; NEXT_PUBLIC_* values are inlined into the client bundle at build time,
# so without this override the staging site's browser code calls the
# production API and fails CORS.
services:
  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://new-staging.energyelhadad.com/api/v1
